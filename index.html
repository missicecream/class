<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miss Icecream · Lab Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4ECE0;
    --card: #FBF6EC;
    --ink: #2B1F15;
    --muted: #8C7A66;
    --muted-soft: #BFB09B;
    --line: #E5D9C4;
    --line-soft: #EFE5D2;
    --accent: #6B8E4E;
    --accent-deep: #4F6B3A;
    --rose-deep: #A85B47;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { -webkit-font-smoothing: antialiased; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Sarabun', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    padding: 56px 20px 56px;
    background-image:
      radial-gradient(circle at 15% 5%, rgba(220, 229, 200, 0.50) 0%, transparent 40%),
      radial-gradient(circle at 88% 95%, rgba(201, 120, 98, 0.10) 0%, transparent 40%);
  }

  .container { max-width: 720px; margin: 0 auto; }

  /* Header */
  header { text-align: center; margin-bottom: 40px; }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    font-weight: 500;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: clamp(34px, 5.5vw, 52px);
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }

  h1 em {
    font-style: italic;
    color: var(--accent-deep);
    font-weight: 400;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.65;
  }

  /* Tool list */
  .tools {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .tool-card {
    display: flex;
    align-items: center;
    gap: 18px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px 24px;
    text-decoration: none;
    color: var(--ink);
    transition: all 0.22s ease;
    box-shadow: 0 4px 24px -18px rgba(43, 31, 21, 0.18);
  }

  .tool-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
    box-shadow: 0 10px 30px -18px rgba(43, 31, 21, 0.3);
  }

  .tool-num {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 30px;
    color: var(--muted-soft);
    width: 40px;
    text-align: center;
    flex-shrink: 0;
  }

  .tool-body { flex: 1; }

  .tool-title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 400;
    line-height: 1.15;
    margin-bottom: 4px;
  }

  .tool-title em {
    font-style: italic;
    color: var(--accent-deep);
  }

  .tool-desc {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.55;
  }

  .tool-arrow {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    color: var(--muted-soft);
    flex-shrink: 0;
    transition: transform 0.22s ease, color 0.22s ease;
  }

  .tool-card:hover .tool-arrow {
    color: var(--accent-deep);
    transform: translateX(4px);
  }

  .empty {
    text-align: center;
    color: var(--muted);
    font-family: 'Fraunces', serif;
    font-style: italic;
    padding: 40px 0;
  }

  /* Footer */
  footer {
    text-align: center;
    margin-top: 44px;
    color: var(--muted);
    font-size: 12.5px;
    line-height: 1.8;
  }

  footer .brand {
    font-size: 10.5px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted-soft);
  }

  @media (max-width: 480px) {
    body { padding: 36px 14px 44px; }
    .tool-card { padding: 18px 18px; gap: 12px; }
    .tool-num { font-size: 24px; width: 30px; }
    .tool-title { font-size: 19px; }
  }
</style>
</head>
<body>
  <div class="container">

    <header>
      <div class="eyebrow">Miss Icecream · Lab Tools</div>
      <h1>เครื่องมือ <em>ทั้งหมด</em></h1>
      <p class="subtitle">รวมเครื่องมือคำนวณสำหรับงานไอศกรีม เลือกเปิดได้จากรายการด้านล่างนะคะ</p>
    </header>

    <div class="tools" id="tools"></div>

    <footer>
      <p class="brand">Miss Icecream</p>
    </footer>

  </div>

<script>
  // เพิ่มไฟล์ใหม่ได้โดยเพิ่มรายการในนี้
  const tools = [
    {
      file: 'Churning.html',
      title: 'Churning <em>Calculator</em>',
      desc: 'คำนวณ %Overrun และระยะเวลาในการปั่นไอศกรีม 4 ชุดในตารางเดียว'
    },
    {
      file: 'PST60x3.html',
      title: 'PST <em>Timer</em>',
      desc: 'Paula’s Spin Technique · จับเวลาพัก 3 รอบ รอบละ 60 วินาที'
    },
    {
      file: 'PST-Selector.html',
      title: 'PST <em>Selector</em>',
      desc: 'ตอบ 2 คำถาม แล้วดูว่าต้องปั่นกี่รอบ รอบละกี่วินาที พักเท่าไหร่'
    },
    {
      file: 'PST-Process-Selector.html',
      title: 'Process <em>Selector</em>',
      desc: 'เลือกเงื่อนไขการผลิต แล้วดูกระบวนการทำไอศกรีมครบ 11 ขั้นแบบเฉพาะของคุณ'
    },
    {
      file: 'LTLT-Log.html',
      title: 'LTLT Pasteurization <em>Log</em>',
      desc: 'บันทึกการพาสเจอไรซ์ LTLT · จับเวลา-อุณหภูมิ · กราฟ · ออกรายงาน PDF A4'
    },
    {
      file: 'PST-PSS-Log.html',
      title: 'PST &amp; PSS <em>Log</em>',
      desc: 'บันทึกเวลา-อุณหภูมิขั้นตอน PST/PSS · คำนวณ %Overrun · กราฟ · รายงาน PDF A4 (สำหรับเก็บผลทดลอง)'
    }
  ];

  const wrap = document.getElementById('tools');

  if (tools.length === 0) {
    wrap.innerHTML = '<div class="empty">ยังไม่มีเครื่องมือในขณะนี้</div>';
  } else {
    tools.forEach((t, i) => {
      const a = document.createElement('a');
      a.className = 'tool-card';
      a.href = t.file;
      a.innerHTML = `
        <div class="tool-num">${i + 1}</div>
        <div class="tool-body">
          <div class="tool-title">${t.title}</div>
          <div class="tool-desc">${t.desc}</div>
        </div>
        <div class="tool-arrow">→</div>
      `;
      wrap.appendChild(a);
    });
  }
</script>
</body>
</html>
